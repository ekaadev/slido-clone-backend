name: AI Code Review (Backup)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

jobs:
  ai-review:
    # Backup workflow using OpenAI GPT when Claude hits rate limits
    # Runs only when manually triggered or Claude workflow fails
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR number
        id: pr-number
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Get PR details and diff
        id: pr-details
        run: |
          gh pr view ${{ steps.pr-number.outputs.pr_number }} --json title,body,files > pr-info.json
          gh pr diff ${{ steps.pr-number.outputs.pr_number }} > pr-diff.txt
          
          echo "PR Details:"
          cat pr-info.json
          
          echo "Files changed:"
          jq -r '.files[].path' pr-info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai anthropic requests

      - name: Run AI Code Review
        id: ai-review
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import json
          import sys
          
          # Try multiple AI providers as fallbacks
          def review_with_openai(pr_info, pr_diff):
              """Use OpenAI GPT-4 for code review"""
              import openai
              
              api_key = os.environ.get('OPENAI_API_KEY')
              if not api_key:
                  return None, "OpenAI API key not configured"
              
              client = openai.OpenAI(api_key=api_key)
              
              prompt = f"""Review this Pull Request:

          Title: {pr_info['title']}
          
          Description:
          {pr_info.get('body', 'No description provided')}
          
          Files Changed:
          {', '.join([f['path'] for f in pr_info['files']])}
          
          Diff:
          {pr_diff[:10000]}  # Limit to avoid token limits
          
          Focus on:
          1. Bugs and correctness issues
          2. Security vulnerabilities
          3. Documentation accuracy (especially if this is a docs PR)
          4. Logic errors
          
          Do NOT comment on style, formatting, or trivial issues.
          Provide a concise review. If no issues found, just say "No issues found."
          """
              
              try:
                  response = client.chat.completions.create(
                      model="gpt-4-turbo-preview",
                      messages=[
                          {"role": "system", "content": "You are an expert code reviewer. Focus only on bugs, security, and correctness."},
                          {"role": "user", "content": prompt}
                      ],
                      max_tokens=2000
                  )
                  return response.choices[0].message.content, None
              except Exception as e:
                  return None, str(e)
          
          # Load PR info
          with open('pr-info.json', 'r') as f:
              pr_info = json.load(f)
          
          with open('pr-diff.txt', 'r') as f:
              pr_diff = f.read()
          
          # Try OpenAI
          review, error = review_with_openai(pr_info, pr_diff)
          
          if review:
              print("REVIEW_SUCCESS=true")
              with open('review-output.txt', 'w') as f:
                  f.write(review)
          else:
              print(f"REVIEW_SUCCESS=false")
              print(f"REVIEW_ERROR={error}")
              sys.exit(1)
          
          PYTHON_SCRIPT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

      - name: Post review comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review-output.txt', 'utf8');
            
            const body = `## 🤖 AI Code Review (Backup)
            
            ${review}
            
            ---
            *Automated review using OpenAI GPT-4 (backup for Claude rate limits)*`;
            
            await github.rest.issues.createComment({
              issue_number: ${{ steps.pr-number.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Manual review notice
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ⚠️ AI Code Review Unavailable
            
            Both Claude and backup AI reviewers are currently unavailable.
            
            Please perform manual code review or try again later.
            
            You can manually trigger this workflow again from the Actions tab.`;
            
            await github.rest.issues.createComment({
              issue_number: ${{ steps.pr-number.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
