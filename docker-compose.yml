services:
  app:
    build: .
    ports:
      - "3000:3000"
    # env_file reads your local .env and injects all vars into the container.
    # The app's viper.go will pick them up via AutomaticEnv().
    env_file: .env
    # Override host-specific vars that differ inside Docker networking.
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      # Named volume: data persists across `docker compose down` and restarts.
      # Use `docker compose down -v` to also delete the data volume.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
